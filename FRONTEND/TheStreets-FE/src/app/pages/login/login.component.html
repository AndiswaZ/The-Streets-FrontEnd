<div class="login-page">
  <h1>The Streets 💖</h1>

  <input [(ngModel)]="user.id" placeholder="Your ID" />
  <input [(ngModel)]="user.name" placeholder="Your name" />

  <select [(ngModel)]="user.role">
    <option>User</option>
    <option>Admin</option>
    <option>SuperAdmin</option>
  </select>

  <button (click)="login()">Enter 🚀</button>
</div>
