<div *ngIf="!post" class="loading">Loading...</div>

<section *ngIf="post" class="post-detail">
  <div class="card">
    <!-- HEADER -->
    <header class="meta">
      <a routerLink="/" class="back">← Back</a>

      <div class="user">
        <div class="avatar">
          {{ (post.createdByDisplayName || post.createdByUserId)[0] }}
        </div>

        <div>
          <span class="author">
            {{ post.createdByDisplayName || post.createdByUserId }}
          </span>
          <span class="time">
            {{ post.createdAt | timeAgo }}
          </span>
          <span *ngIf="post.updatedAt" class="edit">
            · edited {{ post.updatedAt | timeAgo }}
          </span>
        </div>
      </div>

      <button class="delete" *ngIf="canDeletePost()" (click)="deletePost()">
        Delete
      </button>
    </header>

    <!-- MESSAGE -->
    <p class="message">{{ post.message }}</p>

    <!-- ACTIONS -->
    <div class="actions">
      <button
  class="like-btn"
  [class.active]="liked"
  (click)="toggleLike()"
>
  ❤️ {{ post.likeCount }}
</button>
    </div>

    <!-- COMMENTS -->
    <section class="comments">
      <h3>Comments ({{ comments.length }})</h3>

      <!-- NEW COMMENT -->
      <div class="new-comment">
        <textarea
          [(ngModel)]="newComment"
          rows="3"
          placeholder="Add a comment…"
        ></textarea>
        <button class="comment-btn" (click)="addComment()">Comment</button>
      </div>
    </section>
  </div>
</section>

<app-confirm-modal
  [open]="showDeleteModal"
  title="Delete Post"
  message="Are you sure you want to delete this post?"
  (confirmed)="confirmDelete()"
  (cancelled)="cancelDelete()"
>
</app-confirm-modal>
